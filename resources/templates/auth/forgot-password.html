<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot password — Comprineas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full p-6">
    <h1 class="text-2xl font-bold text-gray-900 mb-2 text-center">Forgot your password?</h1>
    <p class="text-gray-600 text-center mb-8">Enter your email and we'll send you a reset link.</p>

    {% if success %}
    <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded mb-4">
      If this email is registered, a reset link has been sent.
    </div>
    {% endif %}

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4">
      {{ error }}
    </div>
    {% endif %}

    <form action="/forgot-password" method="POST" class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
        <input type="email"
               name="email"
               id="email"
               value="{{ email|default:'' }}"
               required
               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border">
      </div>
      <button type="submit"
              class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
        Send reset link
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-500">
      <a href="/login" class="text-indigo-600 hover:text-indigo-500">Back to login</a>
    </p>
  </div>
</body>
</html>
