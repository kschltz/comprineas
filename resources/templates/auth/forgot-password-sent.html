<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check your email — Comprineas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full p-6 text-center">
    <div class="mb-4">
      <svg class="mx-auto h-12 w-12 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Check your email</h1>
    <p class="text-gray-600 mb-6">
      If this email is registered, a password reset link has been sent to <span class="font-medium">{{ email }}</span>.
    </p>
    <p class="text-sm text-gray-500">
      Didn't receive it? Check your spam folder or
      <a href="/forgot-password" class="text-indigo-600 hover:text-indigo-500">try again</a>.
    </p>
  </div>
</body>
</html>
