<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Comprineas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full p-6">
    <h1 class="text-3xl font-bold text-gray-900 mb-2 text-center">Comprineas</h1>
    <p class="text-gray-600 text-center mb-8">Log in to your account</p>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4">
      {{ error }}
    </div>
    {% endif %}

    {% if rate_limited %}
    <div class="bg-orange-50 border border-orange-200 text-orange-700 px-4 py-3 rounded mb-4">
      Too many attempts. Please wait a moment.
    </div>
    {% endif %}

    <!-- Tab buttons -->
    <div class="flex border-b border-gray-200 mb-6">
      <button type="button" id="tab-password" onclick="showTab('password')"
              class="flex-1 py-2 text-sm font-medium text-indigo-600 border-b-2 border-indigo-600 transition-colors">
        Password
      </button>
      <button type="button" id="tab-magic" onclick="showTab('magic')"
              class="flex-1 py-2 text-sm font-medium text-gray-500 border-b-2 border-transparent hover:text-gray-700 transition-colors">
        Magic Link
      </button>
    </div>

    <!-- Password login form -->
    <form id="form-password" action="/login/password" method="POST" class="space-y-4">
      <input type="hidden" name="method" value="password">
      <div>
        <label for="email-password" class="block text-sm font-medium text-gray-700">Email address</label>
        <input type="email"
               name="email"
               id="email-password"
               value="{{ email|default:'' }}"
               required
               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password"
               name="password"
               id="password"
               required
               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border">
      </div>
      <button type="submit"
              class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
        Log in
      </button>
      <p class="text-center text-sm text-gray-500">
        <a href="/forgot-password" class="text-indigo-600 hover:text-indigo-500">Forgot password?</a>
      </p>
    </form>

    <!-- Magic link login form -->
    <form id="form-magic" action="/login" method="POST" class="space-y-4 hidden">
      <input type="hidden" name="method" value="magic">
      <div>
        <label for="email-magic" class="block text-sm font-medium text-gray-700">Email address</label>
        <input type="email"
               name="email"
               id="email-magic"
               value="{{ email|default:'' }}"
               required
               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border">
      </div>
      <button type="submit"
              class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
        Send Magic Link
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-500">
      Don't have an account?
      <a href="/register" class="text-indigo-600 hover:text-indigo-500 font-medium">Create account</a>
    </p>
  </div>

  <script>
    function showTab(tab) {
      var passwordForm = document.getElementById('form-password');
      var magicForm = document.getElementById('form-magic');
      var tabPassword = document.getElementById('tab-password');
      var tabMagic = document.getElementById('tab-magic');

      if (tab === 'password') {
        passwordForm.classList.remove('hidden');
        magicForm.classList.add('hidden');
        tabPassword.classList.add('text-indigo-600', 'border-indigo-600');
        tabPassword.classList.remove('text-gray-500', 'border-transparent');
        tabMagic.classList.remove('text-indigo-600', 'border-indigo-600');
        tabMagic.classList.add('text-gray-500', 'border-transparent');
      } else {
        passwordForm.classList.add('hidden');
        magicForm.classList.remove('hidden');
        tabMagic.classList.add('text-indigo-600', 'border-indigo-600');
        tabMagic.classList.remove('text-gray-500', 'border-transparent');
        tabPassword.classList.remove('text-indigo-600', 'border-indigo-600');
        tabPassword.classList.add('text-gray-500', 'border-transparent');
      }
    }
  </script>
</body>
</html>
