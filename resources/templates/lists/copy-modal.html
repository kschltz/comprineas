<div id="copy-dialog" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg max-w-md w-full mx-4 p-6">
    <h2 class="text-xl font-bold text-gray-900 mb-2">Copy as New List</h2>
    <p class="text-sm text-gray-500 mb-4">
      From: <span class="font-medium text-gray-700">{{ original_name }}</span>
    </p>
    <p class="text-gray-600 mb-4 text-sm">
      This will create a new active list with all items from this completed list.
      The original list will not be modified.
    </p>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4 text-sm">
      {{ error }}
    </div>
    {% endif %}

    <form hx-post="/list/{{ code }}/copy" hx-target="#copy-dialog">
      <div class="mb-4">
        <label for="copy-list-name" class="block text-sm font-medium text-gray-700">New list name</label>
        <input type="text"
               name="name"
               id="copy-list-name"
               value="{{ default_name }}"
               required
               maxlength="100"
               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border">
      </div>
      <div class="flex justify-end gap-3">
        <button type="button"
                class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 bg-white hover:bg-gray-50"
                onclick="document.getElementById('copy-dialog').remove()">
          Cancel
        </button>
        <button type="submit"
                class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
          Copy
        </button>
      </div>
    </form>
  </div>
</div>
