<div id="item-{{item.id}}" class="flex items-center gap-3 p-3 border-b border-gray-100 {% if item.checked %}opacity-50 bg-gray-50{% endif %}">
  <input type="checkbox"
         {% if item.checked %}checked{% endif %}
         hx-post="/list/{{list.code}}/items/{{item.id}}/check"
         hx-target="#item-list"
         hx-swap="innerHTML"
         class="h-5 w-5 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer shrink-0">
  <div class="flex-1 min-w-0">
    <span class="text-gray-900">
      {% if item.checked %}<s>{{item.name}}</s>{% else %}{{item.name}}{% endif %}
    </span>
    {% if item.quantity %}
    <span class="text-gray-500 text-sm ml-1">({{item.quantity}})</span>
    {% endif %}
    {% if item.observations %}
    <p class="text-gray-400 text-sm italic truncate mt-0.5">{{item.observations}}</p>
    {% endif %}
  </div>
  <button hx-delete="/list/{{list.code}}/items/{{item.id}}"
          hx-target="#item-{{item.id}}"
          hx-swap="outerHTML"
          class="text-gray-400 hover:text-red-600 p-1 rounded hover:bg-red-50 shrink-0"
          aria-label="Delete item">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
    </svg>
  </button>
</div>
